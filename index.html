<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tareas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app">
    <h1>Lista de Tareas</h1>

    <div class="input-container">
      <input type="text" id="taskInput" placeholder="Escribe una tarea">
      <button id="addTaskBtn">Agregar</button>
    </div>

    <div class="filters">
      <button data-filter="all">Todos</button>
      <button data-filter="pending">Pendientes</button>
      <button data-filter="completed">Completadas</button>
    </div>

    <ul id="taskList"></ul>

    <div class="footer">
      <p id="pendingCount">0 tareas pendientes</p>
      <button id="clearCompleted">Limpiar completadas</button>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
